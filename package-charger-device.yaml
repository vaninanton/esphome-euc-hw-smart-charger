# Пакет зарядного устройства HW Smart Fast Charger (BLE).
# Vars: charger_id, charger_mac, charger_device_id
# Компонент: github://vaninanton/esphome-euc-hw-smart-charger (components/charger)
# Протокол: сервис FFE1, FFE2=notify (rx), FFE3=write (tx)
---
charger:
  - id: charger_${charger_id}
    id_prefix: ${charger_id}
    device_id: ${charger_device_id}
    sorting_group_id: "sorting_group_${charger_id}"
    target_voltage_id: charger_target_voltage_${charger_id}
    target_current_id: charger_target_current_${charger_id}

ble_client:
  - mac_address: "${charger_mac}"
    id: ble_${charger_id}
    auto_connect: true
    on_connect:
      then:
        - lambda: |-
            id(charger_connected_${charger_id}).publish_state(true);
        - delay: 200ms
        - ble_client.ble_write:
            id: ble_${charger_id}
            service_uuid: FFE1
            characteristic_uuid: FFE3
            value: !lambda "return id(charger_${charger_id}).get_query_packet();"
        - delay: 100ms
        - ble_client.ble_write:
            id: ble_${charger_id}
            service_uuid: FFE1
            characteristic_uuid: FFE3
            value: [0x02, 0x05, 0x05]
        - delay: 100ms
        - ble_client.ble_write:
            id: ble_${charger_id}
            service_uuid: FFE1
            characteristic_uuid: FFE3
            value: [0x02, 0x06, 0x06]
    on_disconnect:
      then:
        - lambda: |-
            id(charger_connected_${charger_id}).publish_state(false);

sensor:
  - platform: ble_client
    id: charger_rx_${charger_id}
    internal: true
    ble_client_id: ble_${charger_id}
    device_id: ${charger_device_id}
    type: characteristic
    notify: true
    service_uuid: FFE1
    characteristic_uuid: FFE2
    lambda: |-
      id(charger_${charger_id}).parse_ble_packet(x);
      return {};

binary_sensor:
  - platform: template
    id: charger_connected_${charger_id}
    name: "Connected"
    icon: mdi:bluetooth
    device_class: connectivity
    device_id: ${charger_device_id}
    web_server:
      sorting_group_id: "sorting_group_${charger_id}"
      sorting_weight: 0

switch:
  - platform: ble_client
    id: ble_connect_${charger_id}
    ble_client_id: ble_${charger_id}
    internal: true

  - platform: template
    name: "Charge"
    id: charger_charge_switch_${charger_id}
    device_id: ${charger_device_id}
    restore_mode: DISABLED
    icon: mdi:ev-station
    # Reflect the charger's real charging state (from the status packet),
    # not just the last toggle the user pressed.
    lambda: "return id(charger_${charger_id}).get_data().charging;"
    web_server:
      sorting_group_id: "sorting_group_${charger_id}"
      sorting_weight: 50
    turn_on_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_toggle_off_packet(0x0C);"
    turn_off_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_toggle_on_packet(0x0C);"

  - platform: template
    name: "Auto-Stop"
    id: charger_autostop_${charger_id}
    device_id: ${charger_device_id}
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    icon: mdi:battery-check
    entity_category: config
    web_server:
      sorting_group_id: "sorting_group_${charger_id}"
      sorting_weight: 51
    turn_on_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_toggle_on_packet(0x14);"
    turn_off_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_toggle_off_packet(0x14);"

number:
  - platform: template
    name: "Target Voltage"
    id: charger_target_voltage_${charger_id}
    device_id: ${charger_device_id}
    optimistic: true
    min_value: 126
    max_value: 151.2
    step: 0.1
    unit_of_measurement: "V"
    icon: mdi:flash
    entity_category: config
    web_server:
      sorting_group_id: "sorting_group_${charger_id}"
      sorting_weight: 60
    set_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_set_voltage_packet(x);"

  - platform: template
    name: "Target Current"
    id: charger_target_current_${charger_id}
    device_id: ${charger_device_id}
    optimistic: true
    min_value: 0.5
    max_value: 20
    step: 0.5
    unit_of_measurement: "A"
    icon: mdi:current-dc
    entity_category: config
    web_server:
      sorting_group_id: "sorting_group_${charger_id}"
      sorting_weight: 61
    set_action:
      - ble_client.ble_write:
          id: ble_${charger_id}
          service_uuid: FFE1
          characteristic_uuid: FFE3
          value: !lambda "return id(charger_${charger_id}).get_set_current_packet(x);"

interval:
  - interval: 1s
    then:
      - if:
          condition:
            binary_sensor.is_on: charger_connected_${charger_id}
          then:
            - ble_client.ble_write:
                id: ble_${charger_id}
                service_uuid: FFE1
                characteristic_uuid: FFE3
                value: !lambda "return id(charger_${charger_id}).get_query_packet();"
  # Periodically re-query config (02 05 05) so Set Voltage/Current reflect the
  # actual values after the user changes them, not just at connect time.
  - interval: 5s
    then:
      - if:
          condition:
            binary_sensor.is_on: charger_connected_${charger_id}
          then:
            - ble_client.ble_write:
                id: ble_${charger_id}
                service_uuid: FFE1
                characteristic_uuid: FFE3
                value: [0x02, 0x05, 0x05]
